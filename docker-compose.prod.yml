version: '3.8'

services:
  freqtrade:
    build: .
    container_name: freqtrade-bot-prod
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.live.json:/freqtrade/config.live.json
      - ./pairs.json:/freqtrade/pairs.json
    environment:
      - FREQTRADE_ENV=live
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    command: >
      freqtrade trade
      --config config.live.json
      --strategy RsiMaStrategy
    networks:
      - freqtrade-network

networks:
  freqtrade-network:
    driver: bridge